<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão Motorista - BETA</title>
    <style>
        /* --- CONFIGURAÇÃO VISUAL --- */
        :root {
            --bg-color: #000000;
            --card-color: #1c1c1e;
            --primary-color: #00E676; 
            --text-color: #ffffff;
            --text-gray: #8e8e93;
            --danger-color: #ff453a;
            --warning-color: #ff9f0a;
            --info-color: #0a84ff;
            --rent-color: #bf5af2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 90px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .text-green { color: var(--primary-color) !important; }
        .text-red { color: var(--danger-color) !important; }
        .text-orange { color: var(--warning-color) !important; }
        .text-blue { color: var(--info-color) !important; }
        .text-purple { color: var(--rent-color) !important; }
        
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-primary { background-color: var(--primary-color); color: #000; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        .btn-text { background: transparent; color: var(--text-gray); }

        #login-screen, #wait-screen { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://source.unsplash.com/random/1080x1920/?luxury-car,night'); 
            background-size: cover; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }

        .login-input { 
            width: 100%; background: rgba(28, 28, 30, 0.8); border: 1px solid #333; 
            padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; 
        }

        /* --- CORREÇÃO TELA DETALHES --- */
        #view-day-detail {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 45; overflow-y: auto; padding-bottom: 90px;
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 20px; }
        .card-main { grid-column: span 2; background: linear-gradient(180deg, #1c1c1e 0%, #111 100%); padding: 24px; border-radius: 18px; text-align: center; border: 1px solid #333; }
        .card-small { background: #1c1c1e; padding: 16px; border-radius: 16px; text-align: center; }
        .label { font-size: 11px; color: var(--text-gray); margin-bottom: 4px; text-transform: uppercase; }
        
        .performance-section { padding: 0 20px; margin-top: 10px; margin-bottom: 20px; }
        .perf-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .card-perf { background: #2c2c2e; padding: 12px; border-radius: 12px; text-align: center; }
        .perf-val { font-size: 16px; font-weight: bold; color: #fff; margin-top: 5px; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #141414; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 15px; z-index: 50; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="font-size: 60px;">🧪</div>
        <h2 style="margin-bottom: 20px;">PRO BETA</h2>
        <input type="email" id="login-email" class="login-input" placeholder="E-mail de Teste">
        <input type="password" id="login-pass" class="login-input" placeholder="Senha">
        <button class="btn btn-primary" onclick="handleAuthAction()" id="btn-main-action">ENTRAR</button>
        <p style="margin-top: 20px; font-size: 13px; color: #888;">
            <span onclick="toggleAuthMode()" id="btn-toggle" style="color: var(--primary-color); font-weight: bold; cursor: pointer;">Criar conta de teste</span>
        </p>
    </div>

    <div id="wait-screen" class="hidden">
        <div style="font-size: 60px;">⏳</div>
        <h2>Acesso Pendente</h2>
        <p style="text-align:center; color:#888; margin: 20px 0;">Usuário registrado no Beta!<br>Libere no Console do Firebase para entrar.</p>
        <button class="btn btn-text" onclick="confirmLogout()">Sair</button>
    </div>

    <div id="view-dashboard" class="hidden">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
            <span id="user-email-display" style="font-weight: bold; color: var(--primary-color);">...</span>
            <button onclick="confirmLogout()" style="background:none; border:none; color:var(--danger-color);">Sair</button>
        </div>
        <div class="summary-grid">
            <div class="card-main">
                <span class="label">LUCRO LÍQUIDO (BETA)</span>
                <div style="font-size: 36px; font-weight: 800; color: var(--primary-color);" id="dash-profit">R$ 0,00</div>
            </div>
        </div>
    </div>

    <div id="view-history" class="hidden">
        <h2 style="padding: 20px;">Histórico Beta</h2>
        <div id="history-list" style="padding: 0 20px;"></div>
    </div>

    <div id="view-day-detail" class="hidden">
        <div style="padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #333; background: #111;">
            <button onclick="handleBackButton()" style="background:none; border:none; font-size:24px; color:#fff;">←</button>
            <h2 id="detail-title" style="margin-left: 15px;">Detalhes</h2>
        </div>
        <div class="summary-grid" style="margin-top:20px;">
            <div class="card-main">
                <span class="label">LUCRO DO DIA</span>
                <div style="font-size: 36px; font-weight: 800; color: var(--primary-color);" id="day-profit">R$ 0,00</div>
            </div>
        </div>
        <div class="performance-section">
            <div class="perf-grid">
                <div class="card-perf"><span class="label">HORAS</span><div id="day-hours" class="perf-val">0h</div></div>
                <div class="card-perf"><span class="label">G/HORA</span><div id="day-hourly" class="perf-val text-green">R$ 0</div></div>
                <div class="card-perf"><span class="label">R$/KM</span><div id="day-km-val" class="perf-val text-blue">R$ 0</div></div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button onclick="switchTab('home')" style="background:none; border:none; color:#888;">🏠 Home</button>
        <button onclick="alert('Funcionalidade de adição simulada no Beta')" style="background:var(--primary-color); width:45px; height:45px; border-radius:50%; border:none;">+</button>
        <button onclick="switchTab('history')" style="background:none; border:none; color:#888;">📂 Histórico</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <script>
        /* CONFIGURAÇÃO DO PRINT DO USUÁRIO */
        const firebaseConfig = {
            apiKey: "AIzaSyCjPBa7QRMxkXlxVgLUSIPelpeF1o3YJyk",
            authDomain: "gestao-motorista-beta.firebaseapp.com",
            projectId: "gestao-motorista-beta",
            storageBucket: "gestao-motorista-beta.firebasestorage.app",
            messagingSenderId: "230375051149",
            appId: "1:230375051149:web:3b77ea02bf91a523a0b7c4",
            measurementId: "G-9WC869PBHC"
        };

        const DB_KEY = 'app_motorista_BETA'; 
        let auth, db;

        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            auth = firebase.auth(); db = firebase.firestore();
            initAuthObserver();
        } catch(e) { console.error(e); }

        function initAuthObserver() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    db.collection("users").doc(user.uid).get().then((doc) => {
                        if (doc.exists && doc.data().autorizado === true) {
                            document.getElementById('login-screen').classList.add('hidden');
                            document.getElementById('wait-screen').classList.add('hidden');
                            document.getElementById('view-dashboard').classList.remove('hidden');
                            document.getElementById('user-email-display').innerText = user.email.split('@')[0];
                        } else {
                            document.getElementById('login-screen').classList.add('hidden');
                            document.getElementById('wait-screen').classList.remove('hidden');
                        }
                    });
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            });
        }

        function handleAuthAction() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if (window.isRegisterMode) {
                auth.createUserWithEmailAndPassword(email, pass).then(cred => {
                    db.collection("users").doc(cred.user.uid).set({ email, autorizado: false });
                });
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
        }

        function openDayDetail(index) {
            const d = getDB()[index]; if(!d) return;
            const rec = (d.uber||0)+(d.pop||0);
            const luc = rec - ((d.fuel||0)+(d.food||0)+(d.rentPaid||0));
            let h = d.hours || 0;
            if(!h && d.hoursFormatted) { const [hh,mm] = d.hoursFormatted.split(':').map(Number); h = hh + (mm/60); }

            document.getElementById('detail-title').innerText = d.date;
            document.getElementById('day-profit').innerText = formatMoney(luc);
            
            // Injeção de performance diária
            document.querySelector('#view-day-detail #day-hours').innerText = h.toFixed(1) + "h";
            document.querySelector('#view-day-detail #day-hourly').innerText = formatMoney(h > 0 ? luc / h : 0);
            document.querySelector('#view-day-detail #day-km-val').innerText = formatMoney((d.km||0) > 0 ? rec / d.km : 0);
            
            document.getElementById('view-day-detail').classList.remove('hidden');
        }

        function switchTab(tab) {
            document.getElementById('view-dashboard').classList.toggle('hidden', tab !== 'home');
            document.getElementById('view-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('view-day-detail').classList.add('hidden');
            if(tab === 'history') renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            getDB().forEach((item, index) => {
                const div = document.createElement('div');
                div.style = "background:#1c1c1e; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #333;";
                div.innerHTML = `<div onclick="openDayDetail(${index})"><strong>${item.date}</strong><br><span style="color:var(--primary-color)">Ver detalhes</span></div>`;
                list.appendChild(div);
            });
        }

        function getDB() { try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; } catch { return []; } }
        function formatMoney(n) { return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function toggleAuthMode() { window.isRegisterMode = !window.isRegisterMode; document.getElementById('btn-main-action').innerText = window.isRegisterMode ? "CRIAR CONTA" : "ENTRAR"; }
        function confirmLogout() { auth.signOut().then(() => window.location.reload()); }
        function handleBackButton() { document.getElementById('view-day-detail').classList.add('hidden'); }
    </script>
</body>
</html>
